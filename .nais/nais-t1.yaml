apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-konteringsinfo-api-t1
  namespace: team-oebs
  labels:
    app: oebs-konteringsinfo-api-t1
    team: team-oebs

spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1

  liveness:
    path: /actuator/health/liveness
    initialDelay: 30
    periodSeconds: 5
    failureThreshold: 3

  readiness:
    path: /actuator/health/readiness
    initialDelay: 30
    periodSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      memory: 2048Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no
  envFrom:
    - secret: main-manager

  accessPolicy:
    outbound:
      external:
        - host: nav-test.konteringsinfo.no
        - host: a34duvw10783.devillo.no
        - ipv4: 10.52.64.43
          ports:
              - port: 1607

  prometheus:
    enabled: true
    path: /actuator/prometheus

  ingresses:
     - "https://oebs-konteringsinfo-api-t1.intern.dev.nav.no"
     - "https://oebs-konteringsinfo-api-t1.ekstern.dev.nav.no"
